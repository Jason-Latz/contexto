<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contexto</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 320px;
      min-height: 200px;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 14px;
      color: #1a2533;
      background: #f5f7fa;
    }

    #root {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .section {
      background: #fff;
      border-radius: 10px;
      padding: 14px 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    }

    .section-title {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #6b7280;
      margin-bottom: 10px;
    }

    .section-title-with-info {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .info-icon {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 16px;
      height: 16px;
      border: 1px solid #94a3b8;
      border-radius: 50%;
      padding: 0;
      background: #fff;
      color: #64748b;
      cursor: help;
      font: inherit;
      font-size: 11px;
      font-weight: 700;
      line-height: 1;
      text-transform: none;
      letter-spacing: 0;
    }

    .info-tooltip {
      position: absolute;
      left: 50%;
      bottom: calc(100% + 8px);
      z-index: 10;
      width: 230px;
      padding: 8px 10px;
      border: 1px solid #d8e2ea;
      border-radius: 6px;
      background: #fff;
      box-shadow: 0 4px 14px rgba(15,23,42,0.16);
      color: #263746;
      font-size: 12px;
      font-weight: 500;
      line-height: 1.35;
      letter-spacing: 0;
      text-align: left;
      text-transform: none;
      transform: translateX(-50%) translateY(2px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 120ms ease, transform 120ms ease;
    }

    .info-icon:hover .info-tooltip,
    .info-icon:focus-visible .info-tooltip {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 3px 0;
      color: #374151;
    }

    .stat-value {
      font-weight: 600;
      color: #1a2533;
    }

    .slider-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    input[type="range"] {
      flex: 1;
      accent-color: #3a7bd5;
      height: 4px;
      cursor: pointer;
    }

    .slider-label {
      font-size: 13px;
      font-weight: 600;
      min-width: 32px;
      text-align: right;
      color: #3a7bd5;
    }

    .toggle-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .toggle-label {
      font-weight: 600;
      color: #263746;
    }

    .toggle-button {
      min-width: 48px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      padding: 5px 10px;
      background: #f8fafc;
      color: #475569;
      cursor: pointer;
      font: inherit;
      font-size: 12px;
      font-weight: 700;
    }

    .toggle-button.is-on {
      border-color: #2a5c82;
      background: #2a5c82;
      color: #fff;
    }

    .word-filter {
      display: flex;
      gap: 6px;
      margin-bottom: 10px;
    }

    .filter-btn {
      padding: 3px 10px;
      border-radius: 12px;
      border: 1px solid #d1d5db;
      background: #fff;
      font-size: 12px;
      cursor: pointer;
      color: #4b5563;
    }

    .filter-btn.active {
      background: #3a7bd5;
      border-color: #3a7bd5;
      color: #fff;
    }

    .export-actions {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }

    .export-button {
      border: 1px solid #c8d3df;
      border-radius: 6px;
      padding: 5px 9px;
      background: #f8fafc;
      color: #263746;
      cursor: pointer;
      font: inherit;
      font-size: 12px;
      font-weight: 600;
    }

    .export-button:disabled {
      cursor: default;
      opacity: 0.45;
    }

    .word-list {
      max-height: 180px;
      overflow-y: auto;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .word-chip {
      padding: 2px 10px;
      border-radius: 10px;
      background: #f8f2e8;
      font-size: 12px;
      color: #4f3210;
      border: 1px solid #ead9bd;
    }

    .empty-msg {
      font-size: 12px;
      color: #9ca3af;
      font-style: italic;
    }

    .domain-form {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }

    .domain-input {
      flex: 1;
      min-width: 0;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      padding: 7px 9px;
      font: inherit;
      color: #1a2533;
      background: #fff;
    }

    .domain-button {
      border: 1px solid #2a5c82;
      border-radius: 6px;
      padding: 7px 10px;
      background: #2a5c82;
      color: #fff;
      cursor: pointer;
      font: inherit;
      font-size: 12px;
    }

    .domain-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .domain-chip {
      padding: 2px 9px;
      border-radius: 10px;
      background: #eef3f7;
      font-size: 12px;
      color: #263746;
      border: 1px solid #d8e2ea;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="../src/popup/index.ts"></script>
</body>
</html>
