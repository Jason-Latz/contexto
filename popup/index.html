<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contexto</title>
  <style>
    /* ---------------------------------------------------------------------
       Contexto design tokens — one academic-minimalist system.
       slate accent = system replacement · warm tan = your own marks.
    --------------------------------------------------------------------- */
    :root {
      --ctx-font: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      --ctx-font-display: 'Iowan Old Style', 'Palatino Linotype', Palatino, Georgia, serif;

      --ctx-ink: #1b2733;
      --ctx-ink-2: #475569;
      --ctx-ink-3: #8a98a8;
      --ctx-eyebrow: #64748b;

      --ctx-accent: #2f5d80;
      --ctx-accent-strong: #244b69;
      --ctx-accent-wash: rgba(47, 93, 128, 0.07);
      --ctx-accent-wash-hover: rgba(47, 93, 128, 0.14);
      --ctx-accent-line: rgba(47, 93, 128, 0.55);

      --ctx-mark-chip-bg: #f8f2e8;
      --ctx-mark-chip-border: #ead9bd;
      --ctx-mark-chip-ink: #5a3a10;

      --ctx-surface: #ffffff;
      --ctx-canvas: #f4f6f9;
      --ctx-canvas-2: #f7f9fb;
      --ctx-border: #dce3ea;
      --ctx-border-strong: #c3cdd7;

      --ctx-shadow-card: 0 1px 2px rgba(27, 39, 51, 0.06), 0 1px 1px rgba(27, 39, 51, 0.04);
      --ctx-shadow-pop: 0 6px 24px rgba(27, 39, 51, 0.16);

      --ctx-radius: 9px;
      --ctx-radius-sm: 6px;
      --ctx-radius-pill: 999px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 340px;
      min-height: 200px;
      font-family: var(--ctx-font);
      font-size: 13px;
      color: var(--ctx-ink);
      background: var(--ctx-canvas);
      -webkit-font-smoothing: antialiased;
    }

    /* --- Brand header --- */
    .app-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 16px 0;
    }

    /* Inverted eñe — matches the toolbar icon: paper tile, slate ring + glyph. */
    .brand-mark {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 30px;
      height: 30px;
      border-radius: 8px;
      background: #f6f2ea;
      border: 1.5px solid var(--ctx-accent);
      color: var(--ctx-accent);
      font-family: var(--ctx-font-display);
      font-size: 20px;
      font-weight: 700;
      line-height: 1;
      flex: none;
      box-shadow: var(--ctx-shadow-card);
    }
    .brand-mark span { transform: translateY(-0.5px); }

    .brand-text { display: flex; flex-direction: column; gap: 1px; }
    .brand-name {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.01em;
      color: var(--ctx-ink);
      line-height: 1.1;
    }
    .brand-tagline {
      font-size: 11px;
      color: var(--ctx-ink-3);
      letter-spacing: 0.01em;
    }

    #root {
      padding: 14px 16px 8px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .section {
      background: var(--ctx-surface);
      border: 1px solid var(--ctx-border);
      border-radius: var(--ctx-radius);
      padding: 14px 16px;
      box-shadow: var(--ctx-shadow-card);
    }

    .section-title {
      font-size: 10.5px;
      font-weight: 700;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: var(--ctx-eyebrow);
      margin-bottom: 11px;
    }

    .section-title-with-info {
      position: relative;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .info-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 15px;
      height: 15px;
      border: 1px solid var(--ctx-border-strong);
      border-radius: 50%;
      padding: 0;
      background: var(--ctx-surface);
      color: var(--ctx-ink-3);
      cursor: help;
      font: inherit;
      font-size: 10px;
      font-weight: 700;
      line-height: 1;
      text-transform: none;
      letter-spacing: 0;
    }

    .info-tooltip {
      /* Anchored to the section-title row (spans the card width) rather than the
         tiny icon, so it can never overflow the popup's left/right edges. */
      position: absolute;
      left: 0;
      right: 0;
      bottom: calc(100% + 8px);
      z-index: 10;
      width: auto;
      padding: 9px 11px;
      border: 1px solid var(--ctx-border);
      border-radius: var(--ctx-radius-sm);
      background: var(--ctx-surface);
      box-shadow: var(--ctx-shadow-pop);
      color: var(--ctx-ink-2);
      font-size: 12px;
      font-weight: 400;
      line-height: 1.4;
      letter-spacing: 0;
      text-align: left;
      text-transform: none;
      transform: translateY(2px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 120ms ease, transform 120ms ease;
    }

    .info-icon:hover .info-tooltip,
    .info-icon:focus-visible .info-tooltip {
      opacity: 1;
      transform: translateY(0);
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 3px 0;
      color: var(--ctx-ink-2);
    }

    .stat-value {
      font-weight: 600;
      color: var(--ctx-ink);
      font-variant-numeric: tabular-nums;
    }

    .slider-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    input[type="range"] {
      flex: 1;
      accent-color: var(--ctx-accent);
      height: 4px;
      cursor: pointer;
    }

    .slider-label {
      font-size: 13px;
      font-weight: 600;
      min-width: 34px;
      text-align: right;
      color: var(--ctx-accent);
      font-variant-numeric: tabular-nums;
    }

    .toggle-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .toggle-label {
      font-weight: 600;
      color: var(--ctx-ink);
    }

    .toggle-button {
      min-width: 48px;
      border: 1px solid var(--ctx-border);
      border-radius: var(--ctx-radius-sm);
      padding: 5px 10px;
      background: var(--ctx-canvas-2);
      color: var(--ctx-ink-2);
      cursor: pointer;
      font: inherit;
      font-size: 12px;
      font-weight: 700;
      transition: background 120ms ease, border-color 120ms ease, color 120ms ease;
    }

    .toggle-button:hover:not(.is-on) { border-color: var(--ctx-border-strong); }

    .toggle-button.is-on {
      border-color: var(--ctx-accent);
      background: var(--ctx-accent);
      color: #fff;
    }

    .word-filter {
      display: flex;
      gap: 6px;
      margin-bottom: 10px;
    }

    .filter-btn {
      padding: 3px 11px;
      border-radius: var(--ctx-radius-pill);
      border: 1px solid var(--ctx-border);
      background: var(--ctx-surface);
      font-size: 12px;
      cursor: pointer;
      color: var(--ctx-ink-2);
      transition: background 120ms ease, border-color 120ms ease, color 120ms ease;
    }

    .filter-btn:hover { border-color: var(--ctx-border-strong); }

    .filter-btn.active {
      background: var(--ctx-accent);
      border-color: var(--ctx-accent);
      color: #fff;
    }

    .export-actions {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }

    .export-button {
      border: 1px solid var(--ctx-border);
      border-radius: var(--ctx-radius-sm);
      padding: 5px 9px;
      background: var(--ctx-canvas-2);
      color: var(--ctx-ink);
      cursor: pointer;
      font: inherit;
      font-size: 12px;
      font-weight: 600;
      transition: background 120ms ease, border-color 120ms ease;
    }

    .export-button:hover:not(:disabled) { border-color: var(--ctx-border-strong); }

    .export-button:disabled {
      cursor: default;
      opacity: 0.45;
    }

    .word-list {
      max-height: 180px;
      overflow-y: auto;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .word-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 8px 3px 10px;
      max-width: 100%;
      border-radius: var(--ctx-radius);
      background: var(--ctx-mark-chip-bg);
      font-size: 12px;
      color: var(--ctx-mark-chip-ink);
      border: 1px solid var(--ctx-mark-chip-border);
    }

    /* English-only fallback chip: same compact pill as before. */
    .word-chip--plain {
      padding: 2px 10px;
      border-radius: var(--ctx-radius-pill);
    }

    /* Spanish-first body; hover or keyboard focus reveals the English meaning. */
    .word-chip__body {
      display: inline-flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 1px;
      min-width: 0;
      cursor: help;
    }

    .word-chip__target {
      font-weight: 600;
      line-height: 1.2;
    }

    .word-chip__reveal {
      display: none;
      font-size: 11px;
      line-height: 1.3;
    }

    .word-chip:hover .word-chip__reveal,
    .word-chip:focus-within .word-chip__reveal {
      display: block;
    }

    .word-chip__english { display: block; font-weight: 600; }
    .word-chip__gloss { display: block; opacity: 0.78; }

    .word-chip__body:focus-visible {
      outline: 2px solid var(--ctx-accent);
      outline-offset: 2px;
      border-radius: 4px;
    }

    .empty-msg {
      font-size: 12px;
      color: var(--ctx-ink-3);
      font-style: italic;
    }

    .domain-form {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }

    .domain-input {
      flex: 1;
      min-width: 0;
      border: 1px solid var(--ctx-border);
      border-radius: var(--ctx-radius-sm);
      padding: 7px 9px;
      font: inherit;
      color: var(--ctx-ink);
      background: var(--ctx-surface);
    }

    .domain-input:focus {
      border-color: var(--ctx-accent);
      outline: none;
    }

    .domain-button {
      border: 1px solid var(--ctx-accent);
      border-radius: var(--ctx-radius-sm);
      padding: 7px 12px;
      background: var(--ctx-accent);
      color: #fff;
      cursor: pointer;
      font: inherit;
      font-size: 12px;
      font-weight: 600;
      transition: background 120ms ease, border-color 120ms ease;
    }

    .domain-button:hover {
      background: var(--ctx-accent-strong);
      border-color: var(--ctx-accent-strong);
    }

    .domain-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .domain-chip {
      padding: 2px 9px;
      border-radius: var(--ctx-radius-pill);
      background: var(--ctx-canvas-2);
      font-size: 12px;
      color: var(--ctx-ink-2);
      border: 1px solid var(--ctx-border);
      cursor: pointer;
      transition: border-color 120ms ease, color 120ms ease;
    }

    .domain-chip:hover { border-color: var(--ctx-border-strong); color: var(--ctx-ink); }

    .domain-hint {
      margin-top: 8px;
      font-size: 11px;
      color: var(--ctx-ink-3);
      line-height: 1.4;
    }

    /* --- Colophon / credit footer --- */
    .ctx-credit {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 6px 0 14px;
      font-size: 11px;
      letter-spacing: 0.02em;
      color: var(--ctx-ink-3);
    }
    .ctx-credit > span:first-child {
      font-weight: 600;
      color: var(--ctx-ink-2);
      letter-spacing: 0.04em;
    }
    .ctx-credit-dot { color: var(--ctx-border-strong); }
    .ctx-credit a {
      color: var(--ctx-ink-3);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: color 120ms ease, border-color 120ms ease;
    }
    .ctx-credit a:hover {
      color: var(--ctx-accent);
      border-bottom-color: var(--ctx-accent-line);
    }
    .ctx-credit a:focus-visible {
      outline: 2px solid var(--ctx-accent);
      outline-offset: 2px;
      border-radius: 2px;
    }

    /* --- Keyboard accessibility --- */
    button:focus-visible,
    input[type="range"]:focus-visible {
      outline: 2px solid var(--ctx-accent);
      outline-offset: 2px;
    }
  </style>
</head>
<body>
  <header class="app-header">
    <span class="brand-mark" aria-hidden="true"><span>ñ</span></span>
    <span class="brand-text">
      <span class="brand-name">Contexto</span>
      <span class="brand-tagline">Passive Spanish immersion</span>
    </span>
  </header>

  <div id="root"></div>

  <footer class="ctx-credit">
    <span>Contexto</span>
    <span class="ctx-credit-dot" aria-hidden="true">·</span>
    <a href="https://jasonlatz.com" target="_blank" rel="noopener noreferrer">jasonlatz.com</a>
  </footer>

  <script type="module" src="../src/popup/index.ts"></script>
</body>
</html>
